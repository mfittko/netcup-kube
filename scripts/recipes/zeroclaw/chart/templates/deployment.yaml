apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zeroclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeroclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zeroclaw.fullname" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "zeroclaw.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: copy-netcup-claw
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - cp /usr/local/bin/netcup-claw /shared-bin/netcup-claw && chmod +x /shared-bin/netcup-claw
          volumeMounts:
            - name: shared-bin
              mountPath: /shared-bin
      containers:
        - name: zeroclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - zeroclaw
            - daemon
          ports:
            - name: gateway
              containerPort: 42617
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - zeroclaw status
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - zeroclaw status
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.credentialsSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.credentialsSecret }}
          {{- end }}
          volumeMounts:
            - name: shared-bin
              mountPath: /shared-bin
              readOnly: true
            - name: zeroclaw-data
              mountPath: /home/zeroclaw/.zeroclaw
            - name: zeroclaw-config
              mountPath: /home/zeroclaw/.zeroclaw/config.toml
              subPath: config.toml
              readOnly: true
      volumes:
        - name: shared-bin
          emptyDir: {}
        - name: zeroclaw-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "zeroclaw.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: zeroclaw-config
          configMap:
            name: {{ include "zeroclaw.fullname" . }}-config
