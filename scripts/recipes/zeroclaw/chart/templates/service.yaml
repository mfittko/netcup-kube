apiVersion: v1
kind: Service
metadata:
  name: {{ include "zeroclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeroclaw.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "zeroclaw.fullname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: gateway
      port: {{ .Values.service.port }}
      targetPort: gateway
      protocol: TCP
