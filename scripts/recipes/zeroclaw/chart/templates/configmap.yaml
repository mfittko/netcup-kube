apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zeroclaw.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeroclaw.labels" . | nindent 4 }}
data:
  config.toml: |
    {{- if .Values.config.content }}
    {{- .Values.config.content | nindent 4 }}
    {{- else }}
    [provider]
    kind = "anthropic"
    model = "claude-sonnet-4-20250514"
    api_key = "${ANTHROPIC_API_KEY}"

    [memory]
    backend = "sqlite"
    auto_save = true

    [runtime]
    kind = "native"
    timeout_secs = 300

    [security]
    sandbox = false
    rate_limit = 30

    [gateway]
    bind = "0.0.0.0:42617"
    tls = false
    {{- end }}
