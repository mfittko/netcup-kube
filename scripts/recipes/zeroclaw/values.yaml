# ZeroClaw Helm values
# This file is used by the install.sh recipe to set Helm values.
# Customize as needed. The file is preserved across reinstalls.

replicaCount: 1

image:
  repository: ghcr.io/zeroclaw-labs/zeroclaw
  tag: "latest"
  pullPolicy: IfNotPresent

# netcup-claw init container — copies the netcup-claw binary to /shared-bin/
# so the main ZeroClaw container can use it at /shared-bin/netcup-claw.
initContainer:
  image:
    repository: ghcr.io/mfittko/netcup-claw
    tag: "latest"
    pullPolicy: IfNotPresent

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 1000m
    memory: 256Mi
